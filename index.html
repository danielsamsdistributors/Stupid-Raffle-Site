<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raffle</title>
<style>
  body {
    font-family: system-ui, sans-serif;
    max-width: 480px;
    margin: 40px auto;
    padding: 0 20px;
    background: #f7f7f8;
    color: #222;
  }
  h1 { text-align: center; }
  form { display: flex; gap: 8px; margin-bottom: 20px; }
  input[type="text"] {
    flex: 1;
    padding: 10px;
    font-size: 16px;
    border: 1px solid #ccc;
    border-radius: 6px;
  }
  button {
    padding: 10px 16px;
    font-size: 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }
  form button { background: #333; color: #fff; }
  ul {
    list-style: none;
    padding: 0;
    margin: 0 0 20px;
  }
  li {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 6px;
    padding: 8px 12px;
    margin-bottom: 6px;
  }
  li button {
    background: none;
    color: #c00;
    font-size: 14px;
    padding: 2px 8px;
  }
  #chooseBtn {
    width: 100%;
    background: #0a7a3d;
    color: #fff;
    padding: 14px;
    font-size: 18px;
    margin-bottom: 16px;
  }
  #chooseBtn:disabled { background: #999; cursor: not-allowed; }
  #winner {
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    min-height: 30px;
  }
  #count { text-align: center; color: #666; margin-bottom: 8px; }
  #fireworks {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 999;
  }
</style>
</head>
<body>

<canvas id="fireworks"></canvas>

<h1>🎟️ Raffle</h1>

<form id="entryForm">
  <input type="text" id="nameInput" placeholder="Enter name" autocomplete="off" required>
  <button type="submit">Add</button>
</form>

<div id="count"></div>
<ul id="entryList"></ul>

<button id="chooseBtn">Choose Winner</button>
<div id="winner"></div>

<script>
  const form = document.getElementById('entryForm');
  const nameInput = document.getElementById('nameInput');
  const entryList = document.getElementById('entryList');
  const chooseBtn = document.getElementById('chooseBtn');
  const winnerEl = document.getElementById('winner');
  const countEl = document.getElementById('count');

  let entries = JSON.parse(localStorage.getItem('raffleEntries') || '[]');

  function save() {
    localStorage.setItem('raffleEntries', JSON.stringify(entries));
  }

  function render() {
    entryList.innerHTML = '';
    entries.forEach((name, i) => {
      const li = document.createElement('li');
      li.textContent = name;
      const removeBtn = document.createElement('button');
      removeBtn.textContent = 'remove';
      removeBtn.onclick = () => {
        entries.splice(i, 1);
        save();
        render();
      };
      li.appendChild(removeBtn);
      entryList.appendChild(li);
    });
    countEl.textContent = entries.length
      ? `${entries.length} entr${entries.length === 1 ? 'y' : 'ies'}`
      : 'No entries yet';
    chooseBtn.disabled = entries.length === 0;
  }

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const name = nameInput.value.trim();
    if (!name) return;
    entries.push(name);
    save();
    nameInput.value = '';
    winnerEl.textContent = '';
    render();
  });

  chooseBtn.addEventListener('click', () => {
    if (entries.length === 0) return;
    const winner = entries[Math.floor(Math.random() * entries.length)];
    winnerEl.textContent = `🎉 Winner: ${winner}`;
    launchFireworks();
  });

  render();

  // --- Fireworks ---
  const canvas = document.getElementById('fireworks');
  const ctx = canvas.getContext('2d');
  let particles = [];
  let fireworksTimer = null;
  let animationFrame = null;

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  function spawnBurst(x, y) {
    if (x === undefined) x = Math.random() * canvas.width;
    if (y === undefined) y = Math.random() * canvas.height * 0.8;
    const hue = Math.floor(Math.random() * 360);
    const count = 40;
    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 * i) / count;
      const speed = 2 + Math.random() * 3;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        alpha: 1,
        color: `hsl(${hue}, 100%, 60%)`
      });
    }
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.03; // gravity
      p.alpha -= 0.015;
      ctx.globalAlpha = Math.max(p.alpha, 0);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
    particles = particles.filter(p => p.alpha > 0);
    animationFrame = requestAnimationFrame(animate);
  }

  function launchFireworks() {
    if (fireworksTimer) clearInterval(fireworksTimer);
    if (!animationFrame) animate();

    // Divide the screen into columns so bursts spread across the whole width,
    // firing a few at once each round for full-screen coverage.
    const columns = 6;
    const colWidth = canvas.width / columns;

    function spawnRound() {
      const order = Array.from({ length: columns }, (_, i) => i)
        .sort(() => Math.random() - 0.5);
      order.slice(0, 3).forEach(col => {
        const x = colWidth * col + Math.random() * colWidth;
        const y = Math.random() * canvas.height * 0.8;
        spawnBurst(x, y);
      });
    }

    spawnRound();
    let rounds = 1;
    fireworksTimer = setInterval(() => {
      spawnRound();
      rounds++;
      if (rounds >= 6) clearInterval(fireworksTimer);
    }, 400);
  }
</script>

</body>
</html>
